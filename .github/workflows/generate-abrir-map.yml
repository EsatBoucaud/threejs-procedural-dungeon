name: Generate ABRIR Map Snapshot

on:
  workflow_dispatch:
  push:
    branches:
      - abrir-mvp
    paths:
      - content/maps/abrir-mvp.config.json
      - scripts/generate-abrir-map.mjs
      - src/abrir/map-state.js
      - src/main.js
      - .github/workflows/generate-abrir-map.yml

permissions:
  contents: write

jobs:
  generate-snapshot:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: abrir-mvp

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate saved map state
        run: npm run generate:map

      - name: Validate saved map state
        run: npm run validate:maps

      - name: Commit snapshot when changed
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/maps/generated
          if git diff --cached --quiet; then
            echo "Generated map snapshot is already current."
          else
            git commit -m "chore: regenerate ABRIR map snapshot [skip ci]"
            git push origin HEAD:abrir-mvp
          fi

name: ABRIR CI

on:
  push:
    branches:
      - abrir-mvp
  pull_request:
    branches:
      - main
      - abrir-mvp

permissions:
  contents: read

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate, validate, and build ABRIR
        run: npm run check

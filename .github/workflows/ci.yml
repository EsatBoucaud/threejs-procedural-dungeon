name: ABRIR prototype checks

on:
  push:
    branches: [main, "abrir/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run check:generation
      - run: npm run check:headquarters
      - run: npm run check:processes
      - run: npm run check:layout
      - run: npm run check:deployment
      - run: npm run check:activities
      - run: npm run check:shared-interactions
      - run: npm run check:comic-reader
      - run: npm run generate:map -- ABRIR-001 public/maps/abrir-001.json
      - run: npm run check
      - run: npm run build

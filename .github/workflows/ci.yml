name: ABRIR CI

on:
  push:
    branches:
      - abrir-mvp
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: abrir-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate, validate, and build
        run: npm run check

      - name: Upload production build
        uses: actions/upload-artifact@v4
        with:
          name: abrir-dist-${{ github.sha }}
          path: dist
          if-no-files-found: error
          retention-days: 14

name: ABRIR prototype checks

on:
  push:
    branches: [main, "abrir/**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm install
      - run: npm run generate:map -- ABRIR-001 public/maps/abrir-001.json
      - run: npm run check
      - run: npm run build
